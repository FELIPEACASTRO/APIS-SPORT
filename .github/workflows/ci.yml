name: CI

on:
  push:
    branches: [main, claude/**]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: lint · test · qa · qa100x · smoke · integration
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci --no-audit --no-fund
      - name: Lint
        run: npm run lint
      - name: Unit tests
        run: npm test
      - name: QA report
        run: npm run qa
      - name: QA 100x double-check
        run: npm run qa:100x
      - name: Smoke test (boots server e exercita 19 cenários)
        run: npm run smoke
      - name: Integration test (boots server e cobre features críticas)
        run: npm run integration
      - name: Dependency audit (SCA)
        run: npm audit --audit-level=moderate
        continue-on-error: true
      - name: Upload smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-report-${{ github.run_id }}
          path: |
            *.log
          retention-days: 7
          if-no-files-found: ignore

  docker:
    name: build & test docker image
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build runtime image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          target: runtime
          tags: apis-sport:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Run container & probe /api/live
        run: |
          docker run -d --name app -p 3000:3000 apis-sport:ci
          for i in {1..30}; do
            if curl -sf http://localhost:3000/api/live; then echo "alive"; break; fi
            sleep 1
          done
          curl -sf http://localhost:3000/api/health | tee /tmp/health.json
          curl -sf http://localhost:3000/api/ready
          curl -sf http://localhost:3000/api/metrics | head -20
          docker logs app | tail -20
          docker stop app

