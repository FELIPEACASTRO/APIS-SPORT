# docker-compose.yml — dev & homologação locais
# Uso:  docker compose up --build

services:
  app:
    build:
      context: .
      target: runtime
    image: apis-sport:local
    container_name: apis-sport
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      LOG_FORMAT: pretty
      LOG_LEVEL: info
      RATE_LIMIT_ENABLED: "true"
      # RAPIDAPI_KEY: <chave server-side para modo real>
      # REAL_INVOKE_TOKEN: <token interno obrigatório quando RAPIDAPI_KEY estiver ativa>
      # METRICS_TOKEN: <token opcional para proteger /api/metrics*>
      ALLOW_CLIENT_RAPIDAPI_KEY: "false"
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/api/live').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
